<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Control de Peso</title>
<style>
:root {
  --verde: #2e7d32;
  --rojo: #c62828;
  --gris: #e0e0e0;
  --primario: #1976d2;
}
body {
  margin: 0;
  padding: 0;
  background: #f4f7fa;
  font-family: system-ui;
}
.app {
  padding: 16px;
  max-width: 600px;
  margin: auto;
}
.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
h1, h2 {
  margin: 0 0 12px 0;
  font-size: 1.3rem;
}
label {
  font-size: 0.9rem;
  font-weight: 600;
}
input, select {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 0.95rem;
}
.btn {
  width: 100%;
  padding: 10px;
  background: var(--primario);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  margin-top: 6px;
}
.btn-secondary {
  background: #555;
}
.table-container {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 100%;
}
th, td {
  border: 1px solid var(--gris);
  padding: 4px;
  text-align: center;
  font-size: 0.8rem;
  white-space: nowrap;
}
th:nth-child(1),
td:nth-child(1) { width: 12%; }
th:nth-child(2),
td:nth-child(2) { width: 22%; }
th:nth-child(3),
td:nth-child(3) { width: 22%; }
th:nth-child(4),
td:nth-child(4) { width: 22%; }
th:nth-child(5),
td:nth-child(5) { width: 22%; }
.status-ok { color: var(--verde); font-weight: 700; }
.status-bad { color: var(--rojo); font-weight: 700; }
.small {
  font-size: 0.8rem;
  color: #555;
}
</style>
</head>
<body>
<div class="app">
  <h1>Control de Peso</h1>

  <!-- USUARIO -->
  <div class="card">
    <h2>Usuario</h2>

    <label>Nombre</label>
    <input id="nombre" />

    <label>Sexo</label>
    <select id="sexo">
      <option value="">Selecciona…</option>
      <option value="hombre">Hombre</option>
      <option value="mujer">Mujer</option>
    </select>

    <label>Edad</label>
    <input type="number" id="edad" />

    <label>Peso actual (kg)</label>
    <input type="number" id="peso" step="0.1" />

    <label>Altura (cm)</label>
    <input type="number" id="altura" />

    <button class="btn" id="btnCrearUsuario">Crear usuario nuevo</button>
    <button class="btn btn-secondary" id="btnCargarUsuario">Cargar usuario existente</button>

    <p id="infoUsuario" class="small"></p>
  </div>

  <!-- PLAN -->
  <div class="card">
    <h2>Plan de pérdida</h2>

    <label>Intensidad</label>
    <select id="intensidad">
      <option value="">Selecciona…</option>
      <option value="conservadora">Conservadora</option>
      <option value="realista">Realista</option>
      <option value="agresiva">Agresiva</option>
    </select>

    <button class="btn" id="btnCrearPlan">Crear / Recalcular plan</button>

    <p id="resumenPlan" class="small"></p>
  </div>

  <!-- REGISTRAR PESO -->
  <div class="card">
    <h2>Registrar peso</h2>

    <label>Semana (pendiente de registrar)</label>
    <select id="semanaSelect"></select>

    <label>Peso real (kg)</label>
    <input type="number" id="pesoReal" step="0.1" />

    <button class="btn" id="btnRegistrarPeso">Registrar</button>
  </div>

  <!-- MODIFICAR REGISTRO -->
  <div class="card">
    <h2>Modificar registro</h2>

    <label>Semana (ya registrada)</label>
    <select id="semanaEditSelect"></select>

    <label>Nuevo peso real (kg)</label>
    <input type="number" id="pesoRealEdit" step="0.1" />

    <button class="btn btn-secondary" id="btnEditarPeso">Modificar registro</button>
  </div>

  <!-- SEGUIMIENTO -->
  <div class="card">
    <h2>Seguimiento</h2>
    <div class="table-container">
      <div id="tabla"></div>
    </div>
  </div>
</div>

<script>
let users = {};          // { nombre: { usuario, plan, registros } }
let currentUser = null;  // nombre del usuario activo

/* ---- LOCALSTORAGE ---- */
function loadUsers() {
  const data = localStorage.getItem("pesoAppUsers");
  if (!data) return;
  users = JSON.parse(data);
}
function saveUsers() {
  localStorage.setItem("pesoAppUsers", JSON.stringify(users));
}
loadUsers();

/* ---- PESO IDEAL ---- */
function calcularPesoIdeal(sexo, altura, edad) {
  let base = sexo === "hombre"
    ? 50 + 0.9 * (altura - 152)
    : 45.5 + 0.9 * (altura - 152);
  if (edad > 40) base += (edad - 40) * 0.1;
  return parseFloat(base.toFixed(1));
}

/* ---- REFRESCAR UI USUARIO Y PLAN ---- */
function refrescarInfoUsuario() {
  const info = document.getElementById("infoUsuario");
  if (!currentUser || !users[currentUser]) {
    info.textContent = "Sin usuario cargado.";
    document.getElementById("resumenPlan").textContent = "";
    document.getElementById("tabla").innerHTML = "<p>No hay plan creado.</p>";
    document.getElementById("semanaSelect").innerHTML = "";
    document.getElementById("semanaEditSelect").innerHTML = "";
    return;
  }
  const u = users[currentUser].usuario;
  info.textContent = `Sesión: ${u.nombre} (${u.sexo}, ${u.edad} años, ${u.pesoInicial} kg, ${u.altura} cm)`;
  // Rellenar inputs con datos del usuario
  document.getElementById("nombre").value = u.nombre;
  document.getElementById("sexo").value = u.sexo;
  document.getElementById("edad").value = u.edad;
  document.getElementById("peso").value = u.pesoInicial;
  document.getElementById("altura").value = u.altura;

  // Si hay plan, mostrar resumen y tabla
  if (users[currentUser].plan && users[currentUser].plan.length > 0) {
    renderResumenPlan();
    rellenarSelectsSemanas();
    renderTabla();
  } else {
    document.getElementById("resumenPlan").textContent = "No hay plan creado para este usuario.";
    document.getElementById("tabla").innerHTML = "<p>No hay plan creado.</p>";
    document.getElementById("semanaSelect").innerHTML = "";
    document.getElementById("semanaEditSelect").innerHTML = "";
  }
}

/* ---- CREAR USUARIO NUEVO ---- */
function crearUsuarioNuevo() {
  const nombre = document.getElementById("nombre").value.trim();
  const sexo = document.getElementById("sexo").value;
  const edad = parseInt(document.getElementById("edad").value);
  const pesoInicial = parseFloat(document.getElementById("peso").value);
  const altura = parseInt(document.getElementById("altura").value);

  if (!nombre || !sexo || !edad || !pesoInicial || !altura) {
    alert("Completa todos los datos del usuario");
    return;
  }
  if (users[nombre]) {
    alert("Ya existe un usuario con ese nombre. No se puede sobreescribir.");
    return;
  }

  users[nombre] = {
    usuario: { nombre, sexo, edad, pesoInicial, altura },
    plan: [],
    registros: []
  };
  currentUser = nombre;
  saveUsers();
  alert("Usuario creado correctamente");
  refrescarInfoUsuario();
}

/* ---- CARGAR USUARIO EXISTENTE ---- */
function cargarUsuarioExistente() {
  const nombre = document.getElementById("nombre").value.trim();
  if (!nombre) {
    alert("Introduce el nombre del usuario a cargar");
    return;
  }
  if (!users[nombre]) {
    alert("No existe un usuario con ese nombre");
    return;
  }
  currentUser = nombre;
  alert("Usuario cargado");
  refrescarInfoUsuario();
}

/* ---- CREAR / RECALCULAR PLAN ---- */
function crearPlan() {
  if (!currentUser || !users[currentUser]) {
    alert("Primero crea o carga un usuario");
    return;
  }
  const intensidad = document.getElementById("intensidad").value;
  if (!intensidad) {
    alert("Selecciona intensidad");
    return;
  }

  const u = users[currentUser].usuario;
  const pesoIdeal = calcularPesoIdeal(u.sexo, u.altura, u.edad);

  const factores = {
    conservadora: 0.004,
    realista: 0.007,
    agresiva: 0.012
  };
  const perdidaSemanal = u.pesoInicial * factores[intensidad];

  const plan = [];
  let pesoActual = u.pesoInicial;
  let semana = 1;

  while (pesoActual > pesoIdeal) {
    plan.push({
      semana,
      pesoObjetivo: parseFloat(pesoActual.toFixed(2))
    });
    pesoActual -= perdidaSemanal;
    semana++;
  }
  plan.push({
    semana,
    pesoObjetivo: pesoIdeal
  });

  users[currentUser].plan = plan;
  // Al recalcular plan, mantenemos registros existentes si coinciden en semanas,
  // pero podrían quedar semanas fuera si el plan se acorta; filtramos:
  users[currentUser].registros = users[currentUser].registros.filter(r =>
    plan.some(p => p.semana === r.semana)
  );

  saveUsers();
  renderResumenPlan(pesoIdeal, perdidaSemanal, plan.length);
  rellenarSelectsSemanas();
  renderTabla();
}

/* ---- RESUMEN PLAN ---- */
function renderResumenPlan(pesoIdealParam, perdidaSemanalParam, semanasParam) {
  const resumen = document.getElementById("resumenPlan");
  const u = users[currentUser].usuario;
  const plan = users[currentUser].plan;
  if (!plan || plan.length === 0) {
    resumen.textContent = "No hay plan creado.";
    return;
  }
  const pesoIdeal = pesoIdealParam ?? plan[plan.length - 1].pesoObjetivo;
  const semanas = semanasParam ?? plan.length;
  const perdidaSemanal = perdidaSemanalParam ?? (u.pesoInicial - pesoIdeal) / (semanas - 1 || 1);

  resumen.innerHTML = `
    Usuario: <strong>${u.nombre}</strong><br>
    Peso ideal: <strong>${pesoIdeal.toFixed(1)} kg</strong><br>
    Semanas de plan: <strong>${semanas}</strong><br>
    Pérdida semanal estimada: <strong>${perdidaSemanal.toFixed(2)} kg</strong>
  `;
}

/* ---- SELECTS DE SEMANAS ---- */
function rellenarSelectsSemanas() {
  const selectPend = document.getElementById("semanaSelect");
  const selectEdit = document.getElementById("semanaEditSelect");
  selectPend.innerHTML = "";
  selectEdit.innerHTML = "";

  const plan = users[currentUser].plan || [];
  const registros = users[currentUser].registros || [];

  plan.forEach(p => {
    const reg = registros.find(r => r.semana === p.semana);
    if (!reg) {
      const opt = document.createElement("option");
      opt.value = p.semana;
      opt.textContent = `Semana ${p.semana} (obj: ${p.pesoObjetivo} kg)`;
      selectPend.appendChild(opt);
    } else {
      const optE = document.createElement("option");
      optE.value = p.semana;
      optE.textContent = `Semana ${p.semana} (real: ${reg.pesoReal} kg)`;
      selectEdit.appendChild(optE);
    }
  });
}

/* ---- REGISTRAR PESO ---- */
function registrarPeso() {
  if (!currentUser || !users[currentUser] || !users[currentUser].plan.length) {
    alert("No hay usuario o plan activo");
    return;
  }
  const semana = parseInt(document.getElementById("semanaSelect").value);
  const pesoR = parseFloat(document.getElementById("pesoReal").value);

  if (!semana || !pesoR) {
    alert("Selecciona semana y peso real");
    return;
  }

  const registros = users[currentUser].registros;
  const existente = registros.find(r => r.semana === semana);
  if (existente) existente.pesoReal = pesoR;
  else registros.push({ semana, pesoReal: pesoR });

  document.getElementById("pesoReal").value = "";
  saveUsers();
  rellenarSelectsSemanas();
  renderTabla();
}

/* ---- EDITAR REGISTRO ---- */
function editarPeso() {
  if (!currentUser || !users[currentUser] || !users[currentUser].plan.length) {
    alert("No hay usuario o plan activo");
    return;
  }
  const semana = parseInt(document.getElementById("semanaEditSelect").value);
  const pesoR = parseFloat(document.getElementById("pesoRealEdit").value);

  if (!semana || !pesoR) {
    alert("Selecciona semana y nuevo peso real");
    return;
  }

  const registros = users[currentUser].registros;
  const existente = registros.find(r => r.semana === semana);
  if (!existente) {
    alert("No hay registro para esa semana");
    return;
  }
  existente.pesoReal = pesoR;

  document.getElementById("pesoRealEdit").value = "";
  saveUsers();
  rellenarSelectsSemanas();
  renderTabla();
}

/* ---- TABLA ---- */
function renderTabla() {
  const cont = document.getElementById("tabla");
  if (!currentUser || !users[currentUser] || !users[currentUser].plan.length) {
    cont.innerHTML = "<p>No hay plan creado.</p>";
    return;
  }

  const plan = users[currentUser].plan;
  const registros = users[currentUser].registros;

  let html = `
    <table>
      <tr>
        <th>Sem</th>
        <th>Obj (kg)</th>
        <th>Real (kg)</th>
        <th>Dif (kg)</th>
        <th>Estado</th>
      </tr>
  `;

  plan.forEach(p => {
    const reg = registros.find(r => r.semana === p.semana);
    let real = reg ? reg.pesoReal : "-";
    let diff = "-";
    let estado = "-";
    let clase = "";

    if (reg) {
      diff = (reg.pesoReal - p.pesoObjetivo).toFixed(2);
      if (reg.pesoReal <= p.pesoObjetivo) {
        estado = "🟢";
        clase = "status-ok";
      } else {
        estado = "🔴";
        clase = "status-bad";
      }
    }

    html += `
      <tr>
        <td>${p.semana}</td>
        <td>${p.pesoObjetivo}</td>
        <td>${real}</td>
        <td>${diff}</td>
        <td class="${clase}">${estado}</td>
      </tr>
    `;
  });

  html += "</table>";
  cont.innerHTML = html;
}

/* ---- EVENTOS ---- */
document.getElementById("btnCrearUsuario").addEventListener("click", crearUsuarioNuevo);
document.getElementById("btnCargarUsuario").addEventListener("click", cargarUsuarioExistente);
document.getElementById("btnCrearPlan").addEventListener("click", crearPlan);
document.getElementById("btnRegistrarPeso").addEventListener("click", registrarPeso);
document.getElementById("btnEditarPeso").addEventListener("click", editarPeso);

// Al cargar, si hubiera usuarios, no se selecciona ninguno hasta que pongas nombre y cargues.
refrescarInfoUsuario();
</script>
</body>
</html>
