<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Control de Peso</title>

<style>
/* ---------------------------
   MOBILE FIRST
---------------------------- */
:root {
  --verde: #2e7d32;
  --rojo: #c62828;
  --gris: #e0e0e0;
  --primario: #1976d2;
}

body {
  margin: 0;
  padding: 0;
  background: #f4f7fa;
  font-family: system-ui;
}

.app {
  padding: 16px;
  max-width: 600px;
  margin: auto;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

h1, h2 {
  margin: 0 0 12px 0;
  font-size: 1.3rem;
}

label {
  font-size: 0.9rem;
  font-weight: 600;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 4px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 1rem;
}

.btn {
  width: 100%;
  padding: 12px;
  background: var(--primario);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  margin-top: 8px;
}

.table-container {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 500px;
}

th, td {
  border: 1px solid var(--gris);
  padding: 6px;
  text-align: center;
  font-size: 0.85rem;
}

.status-ok { color: var(--verde); font-weight: 700; }
.status-bad { color: var(--rojo); font-weight: 700; }

@media (min-width: 600px) {
  h1 { font-size: 1.6rem; }
  h2 { font-size: 1.3rem; }
}
</style>
</head>

<body>
<div class="app">

<h1>Control de Peso</h1>

<!-- REGISTRO -->
<div class="card">
  <h2>Crear plan</h2>

  <label>Nombre</label>
  <input id="nombre" />

  <label>Sexo</label>
  <select id="sexo">
    <option value="">Selecciona…</option>
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <label>Edad</label>
  <input type="number" id="edad" />

  <label>Peso actual (kg)</label>
  <input type="number" id="peso" step="0.1" />

  <label>Altura (cm)</label>
  <input type="number" id="altura" />

  <label>Intensidad</label>
  <select id="intensidad">
    <option value="">Selecciona…</option>
    <option value="conservadora">Conservadora</option>
    <option value="realista">Realista</option>
    <option value="agresiva">Agresiva</option>
  </select>

  <button class="btn" onclick="crearPlan()">Crear plan</button>

  <p id="resumen"></p>
</div>

<!-- REGISTRO PESO -->
<div class="card">
  <h2>Registrar peso</h2>

  <label>Semana</label>
  <select id="semanaSelect"></select>

  <label>Peso real (kg)</label>
  <input type="number" id="pesoReal" step="0.1" />

  <button class="btn" onclick="registrarPeso()">Registrar</button>
</div>

<!-- SEGUIMIENTO -->
<div class="card">
  <h2>Seguimiento</h2>
  <div class="table-container">
    <div id="tabla"></div>
  </div>
</div>

</div>

<script>
let plan = [];
let registros = [];

/* ---------------------------
   PESO IDEAL
---------------------------- */
function calcularPesoIdeal(sexo, altura, edad) {
  let base = sexo === "hombre"
    ? 50 + 0.9 * (altura - 152)
    : 45.5 + 0.9 * (altura - 152);

  if (edad > 40) base += (edad - 40) * 0.1;

  return parseFloat(base.toFixed(1));
}

/* ---------------------------
   CREAR PLAN
---------------------------- */
function crearPlan() {
  const sexo = document.getElementById("sexo").value;
  const edad = parseInt(document.getElementById("edad").value);
  const pesoInicial = parseFloat(document.getElementById("peso").value);
  const alturaCm = parseInt(document.getElementById("altura").value);
  const intensidad = document.getElementById("intensidad").value;

  if (!sexo || !edad || !pesoInicial || !alturaCm || !intensidad) {
    alert("Completa todos los campos");
    return;
  }

  const pesoIdeal = calcularPesoIdeal(sexo, alturaCm, edad);

  const factores = {
    conservadora: 0.004,
    realista: 0.007,
    agresiva: 0.012
  };

  const perdidaSemanal = pesoInicial * factores[intensidad];

  plan = [];
  let pesoActual = pesoInicial;
  let semana = 1;

  while (pesoActual > pesoIdeal) {
    plan.push({
      semana,
      pesoObjetivo: parseFloat(pesoActual.toFixed(2))
    });
    pesoActual -= perdidaSemanal;
    semana++;
  }

  plan.push({
    semana,
    pesoObjetivo: pesoIdeal
  });

  rellenarSemanas();
  renderTabla();

  resumen.innerHTML = `
    Peso ideal calculado: <strong>${pesoIdeal} kg</strong><br>
    Duración del plan: <strong>${plan.length} semanas</strong><br>
    Pérdida semanal estimada: <strong>${perdidaSemanal.toFixed(2)} kg</strong>
  `;
}

/* ---------------------------
   SELECT SEMANAS
---------------------------- */
function rellenarSemanas() {
  semanaSelect.innerHTML = "";
  plan.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p.semana;
    opt.textContent = `Semana ${p.semana} (obj: ${p.pesoObjetivo} kg)`;
    semanaSelect.appendChild(opt);
  });
}

/* ---------------------------
   REGISTRAR PESO
---------------------------- */
function registrarPeso() {
  const semana = parseInt(semanaSelect.value);
  const pesoR = parseFloat(pesoReal.value);

  if (!semana || !pesoR) return;

  const existente = registros.find(r => r.semana === semana);
  if (existente) existente.pesoReal = pesoR;
  else registros.push({ semana, pesoReal: pesoR });

  pesoReal.value = "";
  renderTabla();
}

/* ---------------------------
   TABLA
---------------------------- */
function renderTabla() {
  let html = `
    <table>
      <tr>
        <th>Semana</th>
        <th>Peso objetivo</th>
        <th>Peso real</th>
        <th>Diferencia</th>
        <th>Estado</th>
      </tr>
  `;

  plan.forEach(p => {
    const reg = registros.find(r => r.semana === p.semana);
    let real = reg ? reg.pesoReal : "-";
    let diff = "-";
    let estado = "-";
    let clase = "";

    if (reg) {
      diff = (reg.pesoReal - p.pesoObjetivo).toFixed(2);
      if (reg.pesoReal <= p.pesoObjetivo) {
        estado = "🟢";
        clase = "status-ok";
      } else {
        estado = "🔴";
        clase = "status-bad";
      }
    }

    html += `
      <tr>
        <td>${p.semana}</td>
        <td>${p.pesoObjetivo}</td>
        <td>${real}</td>
        <td>${diff}</td>
        <td class="${clase}">${estado}</td>
      </tr>
    `;
  });

  html += "</table>";
  tabla.innerHTML = html;
}
</script>

</body>
</html>
